<!DOCTYPE html>
<html>
<head>
    <title>Color Number Table</title>

    <style>
        table {
            border-collapse: collapse;
            margin: 30px auto;
        }

        td {
            width: 40px;
            height: 40px;
            text-align: center;
            font-family: Arial;
            font-weight: bold;
        }
    </style>

    <script>
        var number = 100;

        document.write("<table border='1'>");

        for (var i = 1; i <= 10; i++) {

            document.write("<tr>");

            if (i % 2 == 1) {

                for (var j = 1; j <= 10; j++) {

                    if (j % 2 == 1) {
                        document.write("<td bgcolor='red'>" + number + "</td>");
                    } else {
                        document.write("<td bgcolor='yellow'>" + number + "</td>");
                    }

                    number = number - 1;
                }

            } else {

                var temp = number - 9;

                for (var j = 1; j <= 10; j++) {

                    if (j % 2 == 1) {
                        document.write("<td bgcolor='yellow'>" + temp + "</td>");
                    } else {
                        document.write("<td bgcolor='red'>" + temp + "</td>");
                    }

                    temp = temp + 1;
                }

                number = number - 10;
            }

            document.write("</tr>");
        }

        document.write("</table>");
    </script>

</head>

<body>
</body>
</html>
